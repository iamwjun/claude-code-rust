name: Release

on:
  push:
    branches: [main]

jobs:
  release:
    runs-on: macos-14  # arm64 (aarch64-apple-darwin)
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read package info from Cargo.toml
        id: pkg
        run: |
          NAME=$(grep '^name' Cargo.toml | head -1 | sed 's/.*= *//' | tr -d '"')
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*= *//' | tr -d '"')
          echo "name=$NAME" >> $GITHUB_OUTPUT
          echo "version=v$VERSION" >> $GITHUB_OUTPUT

      - name: Update CHANGELOG.md
        run: |
          VERSION=${{ steps.pkg.outputs.version }}
          DATE=$(date +%Y-%m-%d)
          SHA=${GITHUB_SHA:0:7}
          ENTRY="## ${VERSION} - ${DATE}\n- Built from commit ${SHA}"
          HEADER=$(head -1 CHANGELOG.md)
          BODY=$(tail -n +2 CHANGELOG.md)
          printf '%s\n\n%s\n\n%s\n' "$HEADER" "$(printf "$ENTRY")" "$BODY" > CHANGELOG.md

      - name: Commit CHANGELOG.md
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git diff --cached --quiet || git commit -m "chore: update CHANGELOG for ${{ steps.pkg.outputs.version }} [skip ci]"
          git push origin main

      - name: Check if tag already exists
        id: tag
        run: |
          if git rev-parse "${{ steps.pkg.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Create and push git tag
        if: steps.tag.outputs.exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag ${{ steps.pkg.outputs.version }}
          git push origin ${{ steps.pkg.outputs.version }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build release binary
        run: cargo build --release

      - name: Package binary
        run: |
          NAME=${{ steps.pkg.outputs.name }}
          tar -czvf ${NAME}-aarch64-apple-darwin.tar.gz -C target/release ${NAME}

      - name: Upload to GitHub Release
        if: steps.tag.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.pkg.outputs.version }}
          name: Release ${{ steps.pkg.outputs.version }}
          files: ${{ steps.pkg.outputs.name }}-aarch64-apple-darwin.tar.gz
